<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUDRA AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(160deg, #102a75 0%, #63187a 40%, #c43838 80%, #fca136 100%); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            color: white; 
        }

        /* ऊपर का पूरा पैनल स्क्रीन पर लोहे की तरह स्थिर (Fixed Lock) */
        .fixed-top-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            background: rgba(16, 42, 117, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .sticky-header { 
            padding: 15px 15px 2px 15px; 
            text-align: center; 
            font-size: 28px; 
            font-weight: 900; 
            letter-spacing: 2px; 
            background: linear-gradient(to right, #ff3366, #ff00cc, #33ccff, #ffcc00, #ff3366);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .mode-container { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            padding: 10px 12px 15px 12px; 
        }

        .mode-btn { 
            padding: 8px 20px; 
            border: 1px solid rgba(255,255,255,0.4); 
            background: transparent; 
            color: white; 
            border-radius: 25px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .mode-btn.active { 
            background: white; 
            color: black; 
            font-weight: bold; 
            box-shadow: 0 4px 12px rgba(255,255,255,0.3);
        }

        /* बीच का चैट充 - केवल यही स्क्रॉल होगा */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            margin-top: 120px; /* हेडर स्पेस */
            margin-bottom: 90px; /* इनपुट स्पेस */
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message { 
            max-width: 80%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            line-height: 1.6; 
            font-size: 16px; 
            animation: fadeIn 0.3s ease-out; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .user-message { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 2px; color: white; }
        .bot-message { background: rgba(255, 255, 255, 0.15); align-start; border-bottom-left-radius: 2px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }

        /* नीचे का इनपुट पैनल स्क्रीन के बॉटम में पूरी तरह स्थिर (Fixed Lock) */
        .input-panel { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            padding: 16px; 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            display: flex; 
            gap: 12px; 
            align-items: center; 
            border-top: 1px solid rgba(255,255,255,0.15); 
        }

        input[type="text"] { flex: 1; padding: 15px 20px; border: none; border-radius: 30px; background: rgba(255, 255, 255, 0.18); color: white; font-size: 16px; outline: none; }
        input[type="text"]:focus { background: rgba(255, 255, 255, 0.28); }
        .btn { padding: 14px 28px; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .send-btn { background: #10b981; }
        .mic-btn { background: #ef4444; padding: 12px; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; font-size: 22px; }
        .mic-btn.recording { animation: pulse 1s infinite; background: #b91c1c; }
        
        .spinner { display: flex; align-items: center; gap: 8px; color: #fca136; font-weight: bold; align-self: flex-start; background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 25px; }
        .dot { width: 9px; height: 9px; background: #fca136; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .replay-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; font-size: 13px; background: rgba(255,255,255,0.18); padding: 6px 14px; border-radius: 20px; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow: 0 0 0 14px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
    </style>
</head>
<body>

    <div class="fixed-top-panel">
        <div class="sticky-header">🔱 RUDRA AI</div>
        <div class="mode-container">
            <button id="btn-chat" class="mode-btn active" onclick="setMode('chat')">💬 Chat Mode</button>
            <button id="btn-image" class="mode-btn" onclick="setMode('image')">🎨 Image Mode</button>
        </div>
    </div>

    <div id="chat-box">
        <div class="message bot-message"><b>🔱 RUDRA:</b> प्रणाम मास्टर मंगलम मिश्रा। आज्ञा दीजिए, आज मैं बिल्कुल नए 'ऑल-इन-वन' सुपर充के साथ लाइव हूँ।</div>
    </div>

    <div class="input-panel">
        <button id="mic-button" class="mic-btn" onclick="toggleVoice()">🎤</button>
        <input type="text" id="user-input" placeholder="रुद्र से कुछ पूछें मास्टर...">
        <button class="btn send-btn" onclick="handleSend()">भेजें</button>
    </div>

    <script>
        let currentMode = "chat";
        let isRecording = false;
        let recognition;

        const SYSTEM_PROMPT = `You are RUDRA AI (v2.0), a cutting-edge multimodal super-intelligence assistant. Created and exclusively owned by master Manglam Mishra. Speak a smart mix of Hindi and English.`;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.onresult = function(event) {
                document.getElementById("user-input").value = event.results[0][0].transcript;
                stopMicUI();
                handleSend();
            };
            recognition.onerror = () => stopMicUI();
            recognition.onend = () => stopMicUI();
        }

        function toggleVoice() {
            if (!recognition) return;
            if (!isRecording) {
                try { recognition.start(); isRecording = true; document.getElementById("mic-button").classList.add("recording"); } catch(e){}
            } else { recognition.stop(); }
        }

        function stopMicUI() { isRecording = false; document.getElementById("mic-button").classList.remove("recording"); }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll(".mode-btn").forEach(btn => btn.classList.remove("active"));
            document.getElementById(mode === 'chat' ? 'btn-chat' : 'btn-image').classList.add('active');
        }

        async function handleSend() {
            const inputEl = document.getElementById("user-input");
            let text = inputEl.value.trim();
            if (!text) return;

            appendMessage("user", text);
            inputEl.value = "";
            const loaderId = appendLoader();

            try {
                if (currentMode === "image" || /image|photo|बनाओ|pic|तस्वीर/i.test(text)) {
                    removeLoader(loaderId);
                    appendMessage("bot", "इमेज मोड अभी अपडेट हो रहा है मास्टर, कृपया चैट मोड टेस्ट करें।");
                } else {
                    const aiReply = await askMistral(text);
                    removeLoader(loaderId);
                    appendBotTextWithVoice(aiReply);
                }
            } catch (err) {
                removeLoader(loaderId);
                appendMessage("bot", "कनेक्शन में दिक्कत आ रही है मास्टर। कृपया एक बार पेज रिफ्रेश करें।");
            }
        }

        async function askMistral(prompt) {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: `<s>[INST] ${SYSTEM_PROMPT}\n\n${prompt} [/INST]` })
            });
            const data = await response.json();
            
            let reply = "";
            if (Array.isArray(data)) {
                reply = data[0]?.generated_text || "क्षमा करें, मैं जवाब प्रोसेस नहीं कर पा रहा हूँ।";
            } else {
                reply = data.generated_text || "क्षमा करें, मैं जवाब प्रोसेस नहीं कर पा रहा हूँ।";
            }

            if (reply.includes("[/INST]")) reply = reply.split("[/INST]").pop();
            return reply.trim();
        }

        async function speakText(text, audioElId) {
            try {
                const cleanText = text.replace(/[*`#]/g, "").substring(0, 300);
                document.getElementById(audioElId).src = `https://api.streamelements.com/kappa/v2/speech?voice=Madhur&text=${encodeURIComponent(cleanText)}`;
                document.getElementById(audioElId).play();
            } catch(e){}
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message ${role}-message`;
            div.innerHTML = role === "user" ? `<b>You:</b> ${text}` : `<b>🔱 RUDRA:</b> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendBotTextWithVoice(text) {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = "message bot-message";
            const randId = "aud_" + Math.floor(Math.random() * 100000);
            div.innerHTML = `<b>🔱 RUDRA:</b> ${text}<audio id="${randId}" style="display:none;"></audio><div class="replay-btn" onclick="document.getElementById('${randId}').play()">🔊 दोबारा सुनें</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            speakText(text, randId);
        }

        function appendLoader() {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            const id = "loader_" + Date.now();
            div.id = id; div.className = "spinner";
            div.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div> <span>रुद्र सोच रहा है...</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeLoader(id) { const el = document.getElementById(id); if (el) el.remove(); }
        document.getElementById("user-input").addEventListener("keypress", function(e) { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
