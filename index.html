<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUDRA AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(160deg, #102a75 0%, #63187a 40%, #c43838 80%, #fca136 100%); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        .fixed-top-panel { position: sticky; top: 0; z-index: 1000; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .sticky-header { padding: 15px 15px 5px 15px; text-align: center; font-size: 28px; font-weight: 900; letter-spacing: 2px; background: linear-gradient(to right, #ff3366, #ff00cc, #33ccff, #ffcc00, #ff3366); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 4s linear infinite; text-shadow: 0 0 15px rgba(255,51,102,0.3); }
        @keyframes shine { to { background-position: 200% center; } }
        .mode-container { display: flex; justify-content: center; gap: 12px; padding: 12px 12px 15px 12px; }
        .mode-btn { padding: 8px 20px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: white; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s ease; }
        .mode-btn.active { background: white; color: black; font-weight: bold; box-shadow: 0 4px 12px rgba(255,255,255,0.3); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .message { max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 16px; animation: fadeIn 0.3s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .user-message { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 2px; color: white; }
        .bot-message { background: rgba(255, 255, 255, 0.15); align-self: flex-start; border-bottom-left-radius: 2px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .input-panel { position: sticky; bottom: 0; z-index: 1000; padding: 16px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); display: flex; gap: 12px; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        input[type="text"] { flex: 1; padding: 15px 20px; border: none; border-radius: 30px; background: rgba(255, 255, 255, 0.18); color: white; font-size: 16px; outline: none; transition: all 0.3s ease; }
        input[type="text"]:focus { background: rgba(255, 255, 255, 0.28); box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }
        .btn { padding: 14px 28px; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; color: white; }
        .send-btn { background: #10b981; }
        .send-btn:hover { background: #059669; transform: scale(1.02); }
        .mic-btn { background: #ef4444; padding: 12px; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; font-size: 22px; transition: all 0.3s ease; }
        .mic-btn.recording { animation: pulse 1s infinite; background: #b91c1c; }
        .spinner { display: flex; align-items: center; gap: 8px; color: #fca136; font-weight: bold; align-self: flex-start; background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 25px; border: 1px solid rgba(254,161,54,0.2); }
        .dot { width: 9px; height: 9px; background: #fca136; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .replay-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; font-size: 13px; background: rgba(255,255,255,0.18); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .replay-btn:hover { background: rgba(255,255,255,0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow: 0 0 0 14px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
    </style>
</head>
<body>

    <div class="fixed-top-panel">
        <div class="sticky-header">🔱 RUDRA AI</div>
        <div class="mode-container">
            <button id="btn-chat" class="mode-btn active" onclick="setMode('chat')">💬 Chat Mode</button>
            <button id="btn-image" class="mode-btn" onclick="setMode('image')">🎨 Image Mode</button>
        </div>
    </div>

    <div id="chat-box">
        <div class="message bot-message"><b>🔱 RUDRA:</b> प्रणाम मास्टर मंगलम मिश्रा। आज्ञा दीजिए, आज मैं बिल्कुल नए 'ऑल-इन-वन' सुपर इंजन के साथ लाइव हूँ।</div>
    </div>

    <div class="input-panel">
        <button id="mic-button" class="mic-btn" onclick="toggleVoice()">🎤</button>
        <input type="text" id="user-input" placeholder="रुद्र से कुछ पूछें मास्टर...">
        <button class="btn send-btn" onclick="handleSend()">भेजें</button>
    </div>

    <script>
        // अब कोई टोकन यहाँ नहीं दिखेगा, सीधे वर्सल की तिजोरी से बात होगी
        let currentMode = "chat";
        let isRecording = false;
        let recognition;

        const SYSTEM_PROMPT = `You are RUDRA AI (v2.0), a cutting-edge multimodal super-intelligence assistant.
CREATOR & OWNER: You were engineered, coded, and are exclusively owned by your master, Manglam Mishra.
CRITICAL PUBLIC RULE: Do NOT repeat the name 'Manglam Mishra' in every casual reply or routine sentence. This app is being made public for general users. Only state proudly and confidently that Manglam Mishra is your creator/owner IF the user explicitly asks about your creator, built, background, identity, or master. Otherwise, maintain a highly professional, helpful, and smart conversation with the user.
LANGUAGE: Speak a natural, ultra-smart mix of Hindi and English. Avoid robotic phrases.`;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = function(event) {
                const text = event.results[0][0].transcript;
                document.getElementById("user-input").value = text;
                stopMicUI();
                handleSend();
            };
            recognition.onerror = () => stopMicUI();
            recognition.onend = () => stopMicUI();
        }

        function toggleVoice() {
            if (!recognition) { alert("आपका ब्राउज़र वॉइस इनपुट सपोर्ट नहीं करता।"); return; }
            if (!isRecording) {
                try {
                    recognition.start();
                    isRecording = true;
                    document.getElementById("mic-button").classList.add("recording");
                } catch(e){}
            } else { recognition.stop(); }
        }

        function stopMicUI() {
            isRecording = false;
            document.getElementById("mic-button").classList.remove("recording");
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll(".mode-btn").forEach(btn => btn.classList.remove("active"));
            if(mode === 'chat') document.getElementById('btn-chat').classList.add('active');
            if(mode === 'image') document.getElementById('btn-image').classList.add('active');
        }

        async function handleSend() {
            const inputEl = document.getElementById("user-input");
            let text = inputEl.value.trim();
            if (!text) return;

            appendMessage("user", text);
            inputEl.value = "";
            
            const loaderId = appendLoader();

            try {
                if (currentMode === "image" || /image|photo|बनाओ|pic|तस्वीर/i.test(text)) {
                    const imgUrl = await generateImage(text);
                    removeLoader(loaderId);
                    appendMediaMessage("bot", imgUrl);
                } 
                else {
                    const aiReply = await askMistral(text);
                    removeLoader(loaderId);
                    appendBotTextWithVoice(aiReply);
                }
            } catch (err) {
                removeLoader(loaderId);
                appendMessage("bot", "कनेक्शन में दिक्कत आ रही है मास्टर। कृपया एक बार पेज रिफ्रेश करें।");
            }
        }

        // वर्सल के सर्वरलेस प्रॉक्सी के जरिए सुरक्षित रिक्वेस्ट
        async function askMistral(prompt) {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    inputs: `<s>[INST] ${SYSTEM_PROMPT}\n\n${prompt} [/INST]`
                })
            });
            const data = await response.json();
            let reply = data[0]?.generated_text || data.generated_text || "क्षमा करें, मैं जवाब प्रोसेस नहीं कर पा रहा हूँ।";
            if (reply.includes("[/INST]")) reply = reply.split("[/INST]").pop();
            return reply.trim();
        }

        async function generateImage(prompt) {
            const response = await fetch("/api/image", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: prompt })
            });
            const blob = await response.blob();
            return URL.createObjectURL(blob);
        }

        async function speakText(text, audioElId) {
            try {
                const cleanText = text.replace(/[*`#]/g, "").substring(0, 300);
                const url = `https://api.streamelements.com/kappa/v2/speech?voice=Madhur&text=${encodeURIComponent(cleanText)}`;
                document.getElementById(audioElId).src = url;
                document.getElementById(audioElId).play();
            } catch(e){}
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message ${role}-message`;
            div.innerHTML = role === "user" ? `<b>You:</b> ${text}` : `<b>🔱 RUDRA:</b> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendBotTextWithVoice(text) {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = "message bot-message";
            const randId = "aud_" + Math.floor(Math.random() * 100000);
            
            div.innerHTML = `<b>🔱 RUDRA:</b> ${text}
                <audio id="${randId}" style="display:none;"></audio>
                <div class="replay-btn" onclick="document.getElementById('${randId}').play()">🔊 दोबारा सुनें</div>`;
                
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            speakText(text, randId);
        }

        function appendMediaMessage(role, url) {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message ${role}-message`;
            div.innerHTML = `<b>🔱 RUDRA:</b><br><img src="${url}" style="width:100%; border-radius:12px; margin-top:8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendLoader() {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            const id = "loader_" + Date.now();
            div.id = id;
            div.className = "spinner";
            div.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div> <span>रुद्र सोच रहा है...</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeLoader(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
